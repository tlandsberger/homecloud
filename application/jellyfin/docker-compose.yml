services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.7
    container_name: jellyfin
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /mnt/media:/media:ro
    environment:
      - TZ=Europe/Berlin
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.tlandsberger.de`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure,cloudflare"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.docker.network=proxy"

volumes:
  jellyfin_config:
  jellyfin_cache:

networks:
  proxy:
    external: true
    name: proxy
