services:
  plex:
    image: plexinc/pms-docker:1.43.0.10492-121068a07
    container_name: plex
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - plex_config:/config
      - /mnt/media:/media:ro
    environment:
      - ADVERTISE_IP=https://plex.tlandsberger.de
      - PLEX_CLAIM=${PLEX_CLAIM}
      - TZ=Europe/Berlin
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plex.rule=Host(`plex.tlandsberger.de`)"
      - "traefik.http.routers.plex.entrypoints=websecure,cloudflare"
      - "traefik.http.routers.plex.tls.certresolver=letsencrypt"
      - "traefik.http.services.plex.loadbalancer.server.port=32400"
      - "traefik.docker.network=proxy"
      - "logging=promtail"

volumes:
  plex_config:

networks:
  proxy:
    external: true
    name: proxy
