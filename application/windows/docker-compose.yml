services:
  windows:
    image: ghcr.io/dockur/windows:5.14
    container_name: windows
    restart: unless-stopped
    stop_grace_period: 2m
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    environment:
      - VERSION=11
      - REGION=de-DE
      - KEYBOARD=de-DE
      - RAM_SIZE=8G
      - CPU_CORES=4
      - DISK_SIZE=128G
    volumes:
      - windows_data:/storage
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.windows-web.rule=Host(`win.tlandsberger.de`)"
      - "traefik.http.routers.windows-web.entrypoints=websecure,cloudflare"
      - "traefik.http.routers.windows-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.windows.loadbalancer.server.port=8006"
      - "traefik.tcp.routers.windows-rdp.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.windows-rdp.entrypoints=rdp"
      - "traefik.tcp.services.windows-rdp.loadbalancer.server.port=3389"

volumes:
  windows_data:

networks:
  proxy:
    external: true
    name: proxy
